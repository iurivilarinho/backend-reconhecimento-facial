# Banco de dados
spring.datasource.url=jdbc:sqlserver://198.27.114.51:1433;databaseName=FACE;encrypt=false
spring.datasource.username=sa
spring.datasource.password=server@2023
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Virtual threads (Java 21): melhora a concorrencia da camada HTTP/banco.
spring.threads.virtual.enabled=true

# Upload de imagens
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Swagger / OpenAPI
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

# Reconhecimento facial (ArcFace)
# Distancia do coseno maxima aceita no reconhecimento (quanto menor, mais rigido).
arcface.threshold=0.5
# Tamanho do pool de detectores YuNet (concorrencia maxima da inferencia).
# 0 = numero de processadores disponiveis.
arcface.detector-pool-size=0
# Threads intra-op do ONNX Runtime por inferencia. 0 = padrao do ORT.
# Sob alta concorrencia, valores baixos (1-2) evitam oversubscription.
arcface.intra-op-threads=0
# Habilita o provider CUDA (exige o artifact onnxruntime_gpu e drivers CUDA).
arcface.cuda=false

server.port=8080
